name: Daily AI Digest

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC = 09:00 CEST
  workflow_dispatch:        # manual trigger from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run digest
        working-directory: scripts
        run: node daily-digest.js
        env:
          # LLM — set whichever key matches LLM_PROVIDER in config.js
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # S3-compatible storage (Cloudflare R2, MinIO, AWS S3, …)
          # Prefer S3_* secrets; R2_* are kept for backward compatibility.
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT || secrets.R2_ENDPOINT }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID || secrets.R2_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY || secrets.R2_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
